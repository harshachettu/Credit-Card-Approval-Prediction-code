<!DOCTYPE html>
<html>

<head>
    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Credit Card Approval Prediction</h1>

<form action="/predict" method="POST">

<label>ID</label>
<input type="number" name="ID" required>

<label>Gender (0 = Female, 1 = Male)</label>
<input type="number" name="CODE_GENDER" min="0" max="1" required>

<label>Own Car (0 = No, 1 = Yes)</label>
<input type="number" name="FLAG_OWN_CAR" min="0" max="1" required>

<label>Own House (0 = No, 1 = Yes)</label>
<input type="number" name="FLAG_OWN_REALTY" min="0" max="1" required>

<label>Children</label>
<input type="number" name="CNT_CHILDREN" required>

<label>Annual Income</label>
<input type="number" step="0.01"
       name="AMT_INCOME_TOTAL" required>

<label>Income Type</label>
<input type="number"
       name="NAME_INCOME_TYPE" required>

<label>Education Type</label>
<input type="number"
       name="NAME_EDUCATION_TYPE" required>

<label>Family Status</label>
<input type="number"
       name="NAME_FAMILY_STATUS" required>

<label>Housing Type</label>
<input type="number"
       name="NAME_HOUSING_TYPE" required>

<label>Age (Days Birth)</label>
<input type="number"
       name="DAYS_BIRTH" required>

<label>Employment Days</label>
<input type="number"
       name="DAYS_EMPLOYED" required>

<label>Mobile (Always 1)</label>
<input type="number"
       name="FLAG_MOBIL" value="1">

<label>Work Phone</label>
<input type="number"
       name="FLAG_WORK_PHONE" required>

<label>Phone</label>
<input type="number"
       name="FLAG_PHONE" required>

<label>Email</label>
<input type="number"
       name="FLAG_EMAIL" required>

<label>Family Members</label>
<input type="number"
       step="0.1"
       name="CNT_FAM_MEMBERS" required>

<br><br>

<input type="submit"
       value="Predict">

</form>

</div>

</body>
</html>
